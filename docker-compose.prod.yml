# Production compose for Dokploy. Traefik (managed by Dokploy) handles TLS
# and host/path routing; the app containers don't publish ports themselves.
#
# Usage in Dokploy:
#   1. Create a Compose application pointing at this file
#   2. Fill env vars from .env.prod.example
#   3. Deploy — Dokploy attaches the stack to its dokploy-network so Traefik
#      can reach the services via the labels below.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=https://${PUBLIC_HOST}/api/v1
      - NEXT_PUBLIC_WS_URL=wss://${PUBLIC_HOST}/ws
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      # Catch-all for the domain — every path not claimed by a higher-
      # priority router below falls through to the Next.js frontend.
      - traefik.http.routers.pavutyna-frontend.rule=Host(`${PUBLIC_HOST}`) || Host(`www.${PUBLIC_HOST}`)
      - traefik.http.routers.pavutyna-frontend.entrypoints=websecure
      - traefik.http.routers.pavutyna-frontend.tls=true
      - traefik.http.routers.pavutyna-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.pavutyna-frontend.priority=1
      - traefik.http.services.pavutyna-frontend.loadbalancer.server.port=3000
      # www → apex redirect
      - traefik.http.middlewares.pavutyna-www-redirect.redirectregex.regex=^https://www\.(.+)$$
      - traefik.http.middlewares.pavutyna-www-redirect.redirectregex.replacement=https://$$1
      - traefik.http.middlewares.pavutyna-www-redirect.redirectregex.permanent=true
      - traefik.http.routers.pavutyna-frontend.middlewares=pavutyna-www-redirect

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ENVIRONMENT=prod
      - PUBLIC_URL=https://${PUBLIC_HOST}
      - CORS_ORIGINS=https://${PUBLIC_HOST}
      - COOKIE_SECURE=true
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      # /api/* — REST API
      - traefik.http.routers.pavutyna-api.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api/`)
      - traefik.http.routers.pavutyna-api.entrypoints=websecure
      - traefik.http.routers.pavutyna-api.tls=true
      - traefik.http.routers.pavutyna-api.tls.certresolver=letsencrypt
      - traefik.http.routers.pavutyna-api.priority=10
      - traefik.http.routers.pavutyna-api.service=pavutyna-backend
      # /ws — WebSocket (exact path, upgrades handled by Traefik by default)
      - traefik.http.routers.pavutyna-ws.rule=Host(`${PUBLIC_HOST}`) && Path(`/ws`)
      - traefik.http.routers.pavutyna-ws.entrypoints=websecure
      - traefik.http.routers.pavutyna-ws.tls=true
      - traefik.http.routers.pavutyna-ws.tls.certresolver=letsencrypt
      - traefik.http.routers.pavutyna-ws.priority=20
      - traefik.http.routers.pavutyna-ws.service=pavutyna-backend
      # /webhooks/* — incoming Unipile callbacks
      - traefik.http.routers.pavutyna-webhooks.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/webhooks/`)
      - traefik.http.routers.pavutyna-webhooks.entrypoints=websecure
      - traefik.http.routers.pavutyna-webhooks.tls=true
      - traefik.http.routers.pavutyna-webhooks.tls.certresolver=letsencrypt
      - traefik.http.routers.pavutyna-webhooks.priority=10
      - traefik.http.routers.pavutyna-webhooks.service=pavutyna-backend
      # /health — monitoring probes
      - traefik.http.routers.pavutyna-health.rule=Host(`${PUBLIC_HOST}`) && Path(`/health`)
      - traefik.http.routers.pavutyna-health.entrypoints=websecure
      - traefik.http.routers.pavutyna-health.tls=true
      - traefik.http.routers.pavutyna-health.tls.certresolver=letsencrypt
      - traefik.http.routers.pavutyna-health.priority=30
      - traefik.http.routers.pavutyna-health.service=pavutyna-backend
      - traefik.http.services.pavutyna-backend.loadbalancer.server.port=8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - ENVIRONMENT=prod
      - PUBLIC_URL=https://${PUBLIC_HOST}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - ENVIRONMENT=prod
      - PUBLIC_URL=https://${PUBLIC_HOST}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    # No published ports — only reachable from inside the compose network.

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # No published ports — only reachable from inside the compose network.

volumes:
  mongodb_data:
  redis_data:
  uploads_data:

networks:
  dokploy-network:
    external: true
